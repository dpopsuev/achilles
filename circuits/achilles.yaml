# Achilles — Go vulnerability scanner circuit.
# Second Origami reference implementation — proves the framework works for any domain.
# Imports zero Asterisk domain code. Uses the same DSL, graph walk, extractors, and elements.
# Edge routing uses when: expressions evaluated by expr-lang/expr.
circuit: achilles
description: "Achilles: scan a Go repository for known vulnerabilities, classify by severity, and produce a security assessment."

zones:
  discovery:
    nodes: [scan]
    element: earth
    stickiness: 0
  analysis:
    nodes: [classify, assess]
    element: fire
    stickiness: 1
  output:
    nodes: [report]
    element: air
    stickiness: 0

nodes:
  - name: scan
    element: earth
    family: scan
  - name: classify
    element: fire
    family: classify
  - name: assess
    element: diamond
    family: assess
  - name: report
    element: air
    family: report

edges:
  - id: V1
    name: findings-ready
    from: scan
    to: classify
    when: 'len(output.Findings) > 0'

  - id: V2
    name: no-findings
    from: scan
    to: report
    shortcut: true
    when: 'len(output.Findings) == 0'

  - id: V3
    name: classified
    from: classify
    to: assess
    when: 'true'

  - id: V4
    name: assessment-complete
    from: assess
    to: report
    when: 'true'

  - id: V5
    name: rescan
    from: assess
    to: scan
    loop: true
    when: 'false'

  - id: V6
    name: done
    from: report
    to: _done
    when: 'true'

start: scan
done: _done
